<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicines - Online Medical Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<!-- Header -->
<header class="bg-primary text-white p-3">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center">
            <h1 class="h4"><a th:href="@{/}" class="text-white text-decoration-none">Online Medical Store</a></h1>
            <div>
                <a th:href="@{/login}" class="text-white me-3">Login</a>
                <a th:href="@{/register}" class="text-white">My Account</a>
            </div>
        </div>
    </div>
</header>

<div class="container mt-4">
    <h2>Medicines</h2>

    <!-- Search Bar -->
    <form th:action="@{/medicines}" method="get" class="mb-4">
        <div class="input-group">
            <input type="text" name="search" class="form-control"
                   placeholder="Search medicines..." th:value="${searchKeyword}">
            <button type="submit" class="btn btn-primary">Search</button>
        </div>
    </form>

    <!-- Medicine Grid -->
    <div class="row">
        <div class="col-md-3 mb-4" th:each="medicine : ${medicines}">
            <div class="card h-100">
                <img th:src="${medicine.imageUrl != null ? medicine.imageUrl : 'https://via.placeholder.com/200'}"
                     class="card-img-top" alt="Medicine image" style="height: 200px; object-fit: cover;">
                <div class="card-body">
                    <h5 class="card-title" th:text="${medicine.name}">Medicine Name</h5>
                    <p class="card-text text-muted" th:text="${medicine.category}">Category</p>
                    <p class="card-text fw-bold" th:text="'$' + ${medicine.price}">Price</p>
                    <p th:if="${medicine.stockQuantity > 0}" class="text-success">In Stock</p>
                    <p th:if="${medicine.stockQuantity == 0}" class="text-danger">Out of Stock</p>
                    <p th:if="${medicine.requiresPrescription}" class="text-warning">⚠️ Prescription Required</p>

                    <!-- Add to Cart button (replaces old "View Details") -->
                    <form th:action="@{/cart/add/{id}(id=${medicine.id})}" method="post" class="d-inline">
                        <input type="hidden" name="quantity" value="1">
                        <button type="submit" class="btn btn-sm btn-primary"
                                th:disabled="${medicine.stockQuantity == 0}">
                            Add to Cart
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${medicines.empty}" class="alert alert-info">
        No medicines found.
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
