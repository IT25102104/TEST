<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Orders - Online Medical Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<header class="bg-primary text-white p-3">
    <div class="container">
        <h1 class="h4"><a th:href="@{/}" class="text-white text-decoration-none">Online Medical Store</a></h1>
    </div>
</header>

<div class="container mt-4">
    <h2>My Orders</h2>

    <div th:if="${orders == null or orders.empty}" class="alert alert-info">
        You haven't placed any orders yet. <a th:href="@{/medicines}">Start shopping</a>
    </div>

    <table class="table table-striped" th:if="${orders != null and not orders.empty}">
        <thead>
        <tr>
            <th>Order ID</th>
            <th>Date</th>
            <th>Total</th>
            <th>Status</th>
            <th>Details</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}">1</td>
            <td th:text="${#temporals.format(order.orderDate, 'dd/MM/yyyy HH:mm')}">01/01/2025</td>
            <td th:text="'$' + ${order.totalAmount}">0.00</td>
            <td>
                        <span class="badge"
                              th:classappend="${order.status == 'PENDING' ? 'bg-warning' : ''}
                                               ${order.status == 'SHIPPED' ? 'bg-info' : ''}
                                               ${order.status == 'DELIVERED' ? 'bg-success' : ''}"
                              th:text="${order.status}">PENDING</span>
            </td>
            <td>
                <!-- We'll build a detailed view later -->
                <a th:href="@{/orders/confirmation/{id}(id=${order.id})}" class="btn btn-sm btn-outline-primary">View</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
