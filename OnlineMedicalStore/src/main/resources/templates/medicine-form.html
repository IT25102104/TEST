<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Medicine Form - Online Medical Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h2 th:text="${medicine.id == null ? 'Add New Medicine' : 'Edit Medicine'}">Medicine Form</h2>

            <form th:action="${medicine.id == null ? @{/medicines/add} : @{/medicines/edit/{id}(id=${medicine.id})}}"
                  th:object="${medicine}" method="post">

                <div class="mb-3">
                    <label>Medicine Name</label>
                    <input type="text" th:field="*{name}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Category</label>
                    <input type="text" th:field="*{category}" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Price ($)</label>
                    <input type="number" step="0.01" th:field="*{price}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Stock Quantity</label>
                    <input type="number" th:field="*{stockQuantity}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label>Description</label>
                    <textarea th:field="*{description}" class="form-control" rows="4"></textarea>
                </div>

                <div class="mb-3">
                    <label>Image URL</label>
                    <input type="text" th:field="*{imageUrl}" class="form-control">
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" th:field="*{requiresPrescription}" class="form-check-input" id="prescriptionCheck">
                    <label class="form-check-label" for="prescriptionCheck">Requires Prescription</label>
                </div>

                <button type="submit" class="btn btn-primary">Save Medicine</button>
                <a th:href="@{/medicines}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
