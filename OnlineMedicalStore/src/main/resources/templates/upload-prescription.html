<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Upload Prescription - Online Medical Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<header class="bg-primary text-white p-3">
    <div class="container">
        <h1 class="h4"><a th:href="@{/}" class="text-white text-decoration-none">Online Medical Store</a></h1>
    </div>
</header>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2>Upload Prescription</h2>

            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/prescriptions/upload}" method="post" enctype="multipart/form-data">
                <div class="mb-3">
                    <label class="form-label">Select prescription file (PDF, JPG, PNG)</label>
                    <input type="file" name="file" class="form-control"
                           accept="image/*,.pdf" required>
                </div>
                <!-- Optionally link to an order -->
                <div class="mb-3">
                    <label class="form-label">Order ID (if applicable)</label>
                    <input type="number" name="orderId" class="form-control" placeholder="Optional">
                </div>
                <button type="submit" class="btn btn-primary">Upload</button>
                <a th:href="@{/prescriptions}" class="btn btn-secondary">View My Prescriptions</a>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
