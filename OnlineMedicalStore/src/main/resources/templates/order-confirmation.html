<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Order Confirmation - Online Medical Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<header class="bg-primary text-white p-3">
    <div class="container">
        <h1 class="h4"><a th:href="@{/}" class="text-white text-decoration-none">Online Medical Store</a></h1>
    </div>
</header>

<div class="container mt-5 text-center">
    <div class="alert alert-success">
        <h2>Order Placed Successfully!</h2>
        <p>Order ID: <strong th:text="${order.id}">123</strong></p>
        <p>Total Amount: <strong>$<span th:text="${order.totalAmount}">0.00</span></strong></p>
        <p>Status: <span class="badge bg-info" th:text="${order.status}">PENDING</span></p>
    </div>
    <a th:href="@{/orders}" class="btn btn-primary">View My Orders</a>
    <a th:href="@{/medicines}" class="btn btn-secondary">Continue Shopping</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
